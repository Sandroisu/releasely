name: Releasely Action Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and test Releasely
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Run local Releasely Action
        id: releasely
        uses: ./
        with:
          path: fixtures/action-smoke
          base-ref: ${{ github.event.pull_request.base.sha || github.event.before }}
          fail-on: HIGH
          markdown-report: build/releasely/action-smoke-report.md
          json-report: build/releasely/action-smoke-report.json
          artifact-name: releasely-action-smoke-reports

      - name: Verify smoke reports
        shell: bash
        env:
          MARKDOWN_REPORT_PATH: ${{ steps.releasely.outputs.markdown-report-path }}
          JSON_REPORT_PATH: ${{ steps.releasely.outputs.json-report-path }}
        run: |
          test -f "$MARKDOWN_REPORT_PATH"
          test -f "$JSON_REPORT_PATH"
          python3 - "$JSON_REPORT_PATH" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as report_file:
              report = json.load(report_file)

          assert report["findingsCount"] == 1, report
          assert report["findingsByRule"] == {
              "manifest.component.exported.activity": 1
          }, report
          assert report["findings"][0]["severity"] == "MEDIUM", report
          PY

